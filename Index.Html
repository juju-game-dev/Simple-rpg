<!DOCTYPE html>
<html>
<head>
  <title>Simple RPG</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: #eee;
      text-align: center;
    }
    button {
      margin: 5px;
      padding: 10px;
      font-size: 16px;
    }
    #log {
      margin-top: 20px;
      height: 200px;
      overflow-y: auto;
      border: 1px solid #444;
      padding: 10px;
    }
  </style>
</head>
<body>

<h1>RPG Battle</h1>

<div id="stats"></div>

<div>
  <button onclick="attack()">Attack</button>
  <button onclick="defend()">Defend</button>
  <button onclick="dodge()">Dodge</button>
</div>

<div id="log"></div>

<script>
// RANDOM STATS
function rand(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

let player = {
  hp: 100,
  energy: 50,
  speed: rand(1,3),
  power: rand(1,3),
  armor: rand(0,2)
};

let enemy = {
  hp: 100,
  energy: 50,
  speed: rand(1,3),
  power: rand(1,3),
  armor: rand(0,2)
};

let defending = false;

function updateStats() {
  document.getElementById("stats").innerHTML = `
    <h3>Player</h3>
    HP: ${player.hp} | Energy: ${player.energy}<br>
    Speed: ${player.speed} | Power: ${player.power} | Armor: ${player.armor}
    <h3>Enemy</h3>
    HP: ${enemy.hp} | Energy: ${enemy.energy}
  `;
}

function log(msg) {
  let logDiv = document.getElementById("log");
  logDiv.innerHTML += msg + "<br>";
  logDiv.scrollTop = logDiv.scrollHeight;
}

// ACTIONS
function attack() {
  let cost = 10;
  if (player.energy < cost) return log("Not enough energy!");

  player.energy -= cost;

  let damage = player.power * rand(5,10);
  damage -= enemy.armor * 2;
  damage = Math.max(0, damage);

  enemy.hp -= damage;
  log("You attack for " + damage);

  enemyTurn();
}

function defend() {
  let cost = 5;
  if (player.energy < cost) return log("Not enough energy!");

  player.energy -= cost;
  defending = true;

  player.armor += 2;
  log("You defend (temporary armor boost)");

  enemyTurn();

  player.armor -= 2;
  defending = false;
}

function dodge() {
  let gain = 8;
  let success = rand(1,3) <= player.speed;

  if (success) {
    player.energy += gain;
    log("Dodge success! +energy");
  } else {
    log("Dodge failed!");
  }

  enemyTurn();
}

// ENEMY AI
function enemyTurn() {
  if (enemy.hp <= 0) return endGame("You win!");

  let action = rand(1,3);

  if (action === 1 && enemy.energy >= 10) {
    enemy.energy -= 10;
    let damage = enemy.power * rand(5,10);
    damage -= player.armor * 2;
    damage = Math.max(0, damage);

    player.hp -= damage;
    log("Enemy attacks for " + damage);
  }
  else if (action === 2 && enemy.energy >= 5) {
    enemy.energy -= 5;
    enemy.armor += 2;
    log("Enemy defends");
    setTimeout(()=> enemy.armor -= 2, 500);
  }
  else {
    enemy.energy += 5;
    log("Enemy recovers energy");
  }

  updateStats();

  if (player.hp <= 0) endGame("You lose!");
}

function endGame(msg) {
  log("<b>" + msg + "</b>");
  document.querySelectorAll("button").forEach(b => b.disabled = true);
}

// INIT
updateStats();
log("Battle start!");
</script>

</body>
</html>
